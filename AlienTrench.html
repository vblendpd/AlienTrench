<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alien Trench</title>
  <style>
    html, body {
      margin:          0;
      padding:         0;
      background:      #000;
      height:          100%;
      display:         flex;
      align-items:     center;
      justify-content: center;
    }

    #game-canvas {
      width:      800px;
      height:     500px;
      max-width:  100vw;
      background: #000;
    }
  </style>
  <script src="AlienTrench.js"></script>
</head>
<body>
<canvas id="game-canvas"></canvas>

<script>
  const canvas = document.getElementById('game-canvas');
  const controller = StartGame(canvas);

  window.addEventListener('beforeunload', () => {
    if (controller) {
      controller.destroy();
    }
  });
</script>
</body>
</html>
